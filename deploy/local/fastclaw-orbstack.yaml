# FastClaw — orbstack k8s 本地单文件部署
# 部署顺序: ns → secrets (apply secrets.sh) → config → postgres + minio → bucket-init Job → fastclaw
# Secret 由 deploy/local/secrets.sh 从 .env 单独创建, 不在此文件维护
# 详见 docs/superpowers/specs/2026-06-02-fastclaw-local-repro-design.md §4
#
# 标签规范 (便于 `kubectl get -L app.kubernetes.io/component` 一眼分类):
#   app.kubernetes.io/part-of:    fastclaw-local      (本项目统一伞标签)
#   app.kubernetes.io/component:  database | object-store | config | secrets
#                                 | bootstrap | gateway | monitoring
#   app.kubernetes.io/name:       <具体资源名>
#   app.kubernetes.io/managed-by: kubectl

apiVersion: v1
kind: Namespace
metadata:
  name: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/managed-by: kubectl

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastclaw-config
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: config
    app.kubernetes.io/name: fastclaw-config
    app.kubernetes.io/managed-by: kubectl
data:
  FASTCLAW_PORT: "18953"
  FASTCLAW_BIND: "all"
  FASTCLAW_STORAGE_TYPE: "postgres"
  FASTCLAW_STORAGE_AUTO_MIGRATE: "true"
  FASTCLAW_OBJECT_STORE_TYPE: "minio"
  FASTCLAW_OBJECT_STORE_ENDPOINT: "minio:9000"
  FASTCLAW_OBJECT_STORE_BUCKET: "fastclaw"
  FASTCLAW_OBJECT_STORE_USESSL: "false"
  # Sandbox 默认关闭. 启用需在 .env 配 E2B_API_KEY 并重跑 secrets.sh, 再
  # 把 FASTCLAW_SANDBOX_ENABLED 改 "true". 与上游 helm 默认对齐.
  FASTCLAW_SANDBOX_ENABLED: "false"
  FASTCLAW_SANDBOX_BACKEND: "e2b"
  FASTCLAW_LOG_LEVEL: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: fastclaw-secrets
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: fastclaw-secrets
    app.kubernetes.io/managed-by: kubectl
type: Opaque
# 数据由 deploy/local/secrets.sh 从 .env 写入, 此处不维护真实密钥
stringData:
  STORAGE_DSN: "postgres://fastclaw:fastclaw@postgres:5432/fastclaw?sslmode=disable"
  OBJECT_STORE_ACCESSKEY: "minioadmin"
  OBJECT_STORE_SECRETKEY: "minioadmin"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: database
    app.kubernetes.io/name: postgres
    app.kubernetes.io/managed-by: kubectl
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: fastclaw-local
        app.kubernetes.io/component: database
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_DB,       value: fastclaw }
            - { name: POSTGRES_USER,     value: fastclaw }
            - { name: POSTGRES_PASSWORD, value: fastclaw }
            - { name: PGDATA,            value: /var/lib/postgresql/data/pgdata }
          ports: [{ name: pg, containerPort: 5432 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          readinessProbe:
            exec: { command: ["pg_isready","-U","fastclaw"] }
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: database
    app.kubernetes.io/name: postgres
    app.kubernetes.io/managed-by: kubectl
spec:
  clusterIP: None
  selector: { app: postgres }
  ports: [{ name: pg, port: 5432, targetPort: pg }]

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: object-store
    app.kubernetes.io/name: minio
    app.kubernetes.io/managed-by: kubectl
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata:
      labels:
        app: minio
        app.kubernetes.io/part-of: fastclaw-local
        app.kubernetes.io/component: object-store
        app.kubernetes.io/name: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER,     value: minioadmin }
            - { name: MINIO_ROOT_PASSWORD, value: minioadmin }
          ports:
            - { name: s3,      containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          volumeMounts: [{ name: data, mountPath: /data }]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: s3 }
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }

---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: object-store
    app.kubernetes.io/name: minio
    app.kubernetes.io/managed-by: kubectl
spec:
  selector: { app: minio }
  ports:
    - { name: s3,      port: 9000, targetPort: s3 }
    - { name: console, port: 9001, targetPort: console }

---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/name: minio-bucket-init
    app.kubernetes.io/managed-by: kubectl
spec:
  backoffLimit: 5
  # 完成后 1 小时自动清掉 Pod, 避免 `kubectl get pods` 残留 Completed
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fastclaw-local
        app.kubernetes.io/component: bootstrap
        app.kubernetes.io/name: minio-bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 minioadmin minioadmin
              mc mb --ignore-existing local/fastclaw

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastclaw
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: fastclaw
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector: { matchLabels: { app: fastclaw } }
  template:
    metadata:
      labels:
        app: fastclaw
        app.kubernetes.io/part-of: fastclaw-local
        app.kubernetes.io/component: gateway
        app.kubernetes.io/name: fastclaw
    spec:
      containers:
        - name: fastclaw
          image: fastclaw:local
          # 本地构建的镜像, 不走远端 registry. 镜像构建见 deploy/local/build/build.sh
          # GHCR 上的 :dev 是私有, 上游未授权; 本地 build 绕开. 未来若拿到
          # ghcr.io 访问权, 改回 ghcr.io/fastclaw-ai/fastclaw:dev + IfNotPresent.
          imagePullPolicy: Never
          ports: [{ name: http, containerPort: 18953 }]
          envFrom: [{ configMapRef: { name: fastclaw-config } }]
          env:
            - { name: FASTCLAW_HOME, value: "/data/.fastclaw" }
            - { name: FASTCLAW_STORAGE_DSN,            valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: STORAGE_DSN } } }
            - { name: FASTCLAW_OBJECT_STORE_ACCESSKEY, valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: OBJECT_STORE_ACCESSKEY } } }
            - { name: FASTCLAW_OBJECT_STORE_SECRETKEY, valueFrom: { secretKeyRef: { name: fastclaw-secrets, key: OBJECT_STORE_SECRETKEY } } }
            # OPENAI_API_KEY / 其他 LLM provider key 不注入 pod. 由用户在
            # `fastclaw agents init` 时从自己进程 env 传入, fastclaw 存进
            # agents.api_key. E2B_API_KEY 仅在 sandbox 启用时由 secrets.sh
            # 注入到同名 Secret 键.
          volumeMounts: [{ name: data, mountPath: /data/.fastclaw }]
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          lifecycle:
            preStop: { exec: { command: ["sh","-c","sleep 15"] } }
      terminationGracePeriodSeconds: 30
      volumes: [{ name: data, emptyDir: {} }]

---
apiVersion: v1
kind: Service
metadata:
  name: fastclaw
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: fastclaw
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector: { app: fastclaw }
  sessionAffinity: ClientIP
  sessionAffinityConfig: { clientIP: { timeoutSeconds: 3600 } }
  ports: [{ name: http, port: 80, targetPort: http }]

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastclaw
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: fastclaw
    app.kubernetes.io/managed-by: kubectl
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: fastclaw }
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fastclaw
  namespace: fastclaw
  labels:
    app.kubernetes.io/part-of: fastclaw-local
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: fastclaw
    app.kubernetes.io/managed-by: kubectl
spec:
  minAvailable: 1
  selector: { matchLabels: { app: fastclaw } }
